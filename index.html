<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airlock Sabotage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scanlines"></div>

  <div class="game-screen">

    <!-- HUD Bar -->
    <div class="hud-bar" id="hud-bar">
      <div class="hud-title">◆ AIRLOCK SABOTAGE ◆</div>
      <div class="hud-stats">
        <div class="hud-stat">
          <span class="hud-stat-label">O2 RESERVE</span>
          <div class="hud-bar-wrap">
            <div id="oxygen-bar" class="hud-oxygen-bar"></div>
          </div>
          <span id="oxygen-pct" class="hud-stat-val">100%</span>
        </div>
        <div class="hud-sep">|</div>
        <div class="hud-stat">
          <span class="hud-stat-label">QUERIES</span>
          <span id="interrogation-counter" class="hud-stat-val">10 / 10</span>
        </div>
      </div>
    </div>

    <!-- Scene + Sidebar -->
    <div class="scene-wrapper">

      <!-- Checkerboard scene background -->
      <div class="scene-bg"></div>
      <!-- Floor gradient -->
      <div class="scene-floor"></div>

      <!-- Main character sprite (front and center) -->
      <div class="character-stage">
        <div class="character-glow" id="character-glow"></div>
        <img
          id="main-sprite"
          class="character-sprite"
          src="images/placeholder.png"
          alt="Active suspect"
        >
      </div>

      <!-- Floating side panel -->
      <div class="suspect-sidebar">
        <div class="sidebar-label">CREW</div>

        <div class="chibi-entry active" id="chibi-elena" data-suspect="elena" onclick="selectSuspect('elena')">
          <div class="chibi-box cyan">
            <img src="sprites/elena_chibi.png" alt="" onerror="this.style.display='none'" class="chibi-img">
            <span class="chibi-initials">EL</span>
          </div>
          <div class="chibi-meta">
            <div class="chibi-name">ELENA</div>
            <div class="chibi-role">Engineer</div>
          </div>
          <button class="pixel-btn btn-vent-sm" onclick="event.stopPropagation(); ventSuspect('elena')">VENT</button>
          <div class="unread-dot" id="dot-elena"></div>
        </div>

        <div class="chibi-entry" id="chibi-marcus" data-suspect="marcus" onclick="selectSuspect('marcus')">
          <div class="chibi-box amber">
            <img src="sprites/marcus_chibi.png" alt="" onerror="this.style.display='none'" class="chibi-img">
            <span class="chibi-initials">MA</span>
          </div>
          <div class="chibi-meta">
            <div class="chibi-name">MARCUS</div>
            <div class="chibi-role">Technician</div>
          </div>
          <button class="pixel-btn btn-vent-sm" onclick="event.stopPropagation(); ventSuspect('marcus')">VENT</button>
          <div class="unread-dot" id="dot-marcus"></div>
        </div>

        <div class="chibi-entry" id="chibi-chen" data-suspect="chen" onclick="selectSuspect('chen')">
          <div class="chibi-box green">
            <img src="sprites/chen_chibi.png" alt="" onerror="this.style.display='none'" class="chibi-img">
            <span class="chibi-initials">CH</span>
          </div>
          <div class="chibi-meta">
            <div class="chibi-name">CHEN</div>
            <div class="chibi-role">Botanist</div>
          </div>
          <button class="pixel-btn btn-vent-sm" onclick="event.stopPropagation(); ventSuspect('chen')">VENT</button>
          <div class="unread-dot" id="dot-chen"></div>
        </div>

        <div class="chibi-entry" id="chibi-jax" data-suspect="jax" onclick="selectSuspect('jax')">
          <div class="chibi-box red">
            <img src="sprites/jax_chibi.png" alt="" onerror="this.style.display='none'" class="chibi-img">
            <span class="chibi-initials">JA</span>
          </div>
          <div class="chibi-meta">
            <div class="chibi-name">JAX</div>
            <div class="chibi-role">Security</div>
          </div>
          <button class="pixel-btn btn-vent-sm" onclick="event.stopPropagation(); ventSuspect('jax')">VENT</button>
          <div class="unread-dot" id="dot-jax"></div>
        </div>
      </div>

      <!-- Dialog section floats over the bottom of the scene -->
      <div class="dialog-section">

        <!-- Commander's question — sits above the response box -->
        <div class="question-bar" id="question-bar">
          <span class="question-label">CMDR</span>
          <span class="question-text" id="question-text">—</span>
        </div>

        <!-- Character response box -->
        <div class="dialog-box" id="dialog-box">
          <div class="dialog-name-tab" id="dialog-name-tab">— SELECT A SUSPECT —</div>
          <div class="dialog-log" id="chat-log">
            <span id="dialog-text"></span>
          </div>
        </div>

        <!-- Input -->
        <form class="dialog-input-row" id="chat-form" onsubmit="handleQuestionSubmit(event)">
          <span class="input-cursor">▶</span>
          <input type="text" id="chat-input"
                 placeholder="ENTER INTERROGATION QUERY..."
                 autocomplete="off" required>
          <button type="submit" class="pixel-btn btn-send">TRANSMIT</button>
        </form>
      </div>

    </div><!-- /scene-wrapper -->

    <!-- Diamond strip -->
    <div class="diamond-strip"></div>

  </div>

  <!-- Endgame Overlay -->
  <div id="end-overlay" class="overlay hidden">
    <div class="vn-modal">
      <div class="vn-modal-header">◆ MISSION REPORT ◆</div>
      <h2 id="end-title" class="vn-modal-title"></h2>
      <p id="end-desc" class="vn-modal-desc"></p>
      <button class="pixel-btn btn-retry" onclick="resetGame()">[ RESTART MISSION ]</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
